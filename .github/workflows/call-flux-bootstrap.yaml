---
name: Flux Bootstrap with Dagger
on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: dagger
      environment-name:
        required: false
        type: string
        default: k8s
      source-repo:
        description: "Repository containing the SOPS-encrypted kubeconfig (owner/repo)"
        required: true
        type: string
      kube-config:
        description: "Path to SOPS-encrypted kubeconfig in the repo (e.g. secrets/infra.sthings.lab.yaml)"
        required: true
        type: string
      repository:
        description: "Target repository for Flux config (owner/repo)"
        required: true
        type: string
      destination-path:
        description: "Destination path for Flux config in the repository"
        required: true
        type: string
      operator-version:
        description: "Flux operator version"
        required: true
        type: string
      helmfile-ref:
        description: "Helmfile reference for Flux operator deployment"
        required: false
        type: string
        default: "git::https://github.com/stuttgart-things/helm.git@cicd/flux-operator.yaml.gotmpl"
      branch-name:
        description: "Git branch to checkout"
        required: false
        type: string
        default: main
      dagger-version:
        description: "Dagger CLI version"
        required: false
        type: string
        default: "0.20.1"
      blueprints-version:
        description: "Blueprints Dagger module version"
        required: false
        type: string
        default: v1.71.0
      sops-module-version:
        description: "SOPS Dagger module version"
        required: false
        type: string
        default: v0.82.1

jobs:
  Flux-Bootstrap:
    name: Flux Bootstrap
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment-name }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ inputs.source-repo }}
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: '0'
          ref: ${{ inputs.branch-name }}

      - name: Decrypt kubeconfig with SOPS
        uses: dagger/dagger-for-github@v8.4.0
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        with:
          version: ${{ inputs.dagger-version }}
          verb: call
          module: github.com/stuttgart-things/dagger/sops@${{ inputs.sops-module-version }}
          args: >-
            decrypt
            --age-key env:SOPS_AGE_KEY
            --encrypted-file ${{ inputs.kube-config }}
            export --path /tmp/kubeconfig
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Flux Bootstrap with Dagger
        uses: dagger/dagger-for-github@v8.4.0
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          AGE_PUB: ${{ secrets.AGE_PUB }}
          GITHUB_USER: ${{ github.actor }}
          #GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          version: ${{ inputs.dagger-version }}
          verb: call
          module: github.com/stuttgart-things/blueprints/kubernetes-deployment@${{ inputs.blueprints-version }}
          args: >-
            flux-bootstrap
            --kube-config file:///tmp/kubeconfig
            --deploy-operator=true
            --commit-to-git=true
            --repository ${{ inputs.repository }}
            --destination-path "${{ inputs.destination-path }}"
            --git-username env:GITHUB_USER
            --git-password env:${{ secrets.GH_TOKEN }}
            --git-token env:${{ secrets.GH_TOKEN }}
            --sops-age-key env:SOPS_AGE_KEY
            --age-public-key env:AGE_PUB
            --render-secrets=true
            --apply-secrets=true
            --apply-config=true
            --encrypt-secrets=true
            --helmfile-ref "${{ inputs.helmfile-ref }}"
            --operator-version "${{ inputs.operator-version }}"
            --wait-for-reconciliation=true
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
