---
name: Build & Verify Python Module
on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      module-name:
        required: true
        type: string
      python-version:
        default: "3.12-slim"
        required: false
        type: string
      ruff-version:
        default: "0.8.6"
        required: false
        type: string
      dagger-version:
        default: "0.20.0"
        required: false
        type: string
      dagger-module-version:
        default: v0.86.0
        required: false
        type: string
      environment-name:
        default: k8s
        required: true
        type: string
      accept-linterrors:
        default: false
        required: false
        type: boolean
      accept-failedtests:
        default: false
        required: false
        type: boolean

jobs:
  Lint-Python:
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment-name }}
    continue-on-error: ${{ inputs.accept-linterrors }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Lint python code
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: ${{ inputs.dagger-version }}
          verb: call
          module: github.com/stuttgart-things/dagger/python@${{ inputs.dagger-module-version }}
          args: >-
            lint
            --src .
            --python-version ${{ inputs.python-version }}
            --ruff-version ${{ inputs.ruff-version }}

  Format-Check-Python:
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment-name }}
    continue-on-error: ${{ inputs.accept-linterrors }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Check python formatting
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: ${{ inputs.dagger-version }}
          verb: call
          module: github.com/stuttgart-things/dagger/python@${{ inputs.dagger-module-version }}
          args: >-
            format-check
            --src .
            --python-version ${{ inputs.python-version }}
            --ruff-version ${{ inputs.ruff-version }}

  Test-Python:
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment-name }}
    continue-on-error: ${{ inputs.accept-failedtests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set homerun defaults
        run: |
          echo "SEVERITY=ERROR" >> $GITHUB_ENV
          echo "STATUS=FAILED" >> $GITHUB_ENV
          echo "start=$(date +%s)" >> $GITHUB_ENV

      - name: Test python code
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: ${{ inputs.dagger-version }}
          verb: call
          module: github.com/stuttgart-things/dagger/python@${{ inputs.dagger-module-version }}
          args: >-
            test
            --src .
            --python-version ${{ inputs.python-version }}

      - name: Set homerun values
        if: always()
        run: |
          duration=$(($(date +%s) - start))
          echo "TEST_TIME=${duration}" >> $GITHUB_ENV
          echo "STATUS=SUCCESS" >> $GITHUB_ENV
        env:
          start: ${{ env.start }}

      - name: Send Message To Homerun
        if: always()
        uses: stuttgart-things/github-workflow-templates/actions/send-homerun-message@main
        with:
          url: "https://homerun.homerun-dev.sthings-vsphere.labul.sva.de/generic"
          secretToken: "${{ secrets.HOMERUN_TOKEN }}"
          title: "[PYTHON][TEST] ${{ inputs.module-name }} - ${{ env.STATUS }}"
          message: "COMMIT: ${{ github.event.head_commit.message }} BRANCH: ${{ github.head_ref || github.ref_name }} MODULE: ${{ inputs.module-name }} TEST-TIME: ${TEST_TIME}s REPO: https://github.com/${GITHUB_REPOSITORY}"
          severity: "${{ env.SEVERITY }}"
          artifacts: "${{ inputs.module-name }}"
          tags: "github,${{ inputs.module-name }},python,test"
          assigneeName: "${GITHUB_ACTOR}"

  Security-Scan-Python:
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment-name }}
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Security scan python code
        uses: dagger/dagger-for-github@v8.4.0
        with:
          version: ${{ inputs.dagger-version }}
          verb: call
          module: github.com/stuttgart-things/dagger/python@${{ inputs.dagger-module-version }}
          args: >-
            security-scan
            --src .
            --python-version ${{ inputs.python-version }}
