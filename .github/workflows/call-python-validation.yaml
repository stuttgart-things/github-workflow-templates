---
name: Build & Verify Python Module
on:
  workflow_call:
    inputs:
      runs-on:
        required: true
        type: string
      module-name:
        required: true
        type: string
      python-version:
        default: 3.12-slim
        required: false
        type: string
      ruff-version:
        default: 0.8.6
        required: false
        type: string
      environment-name:
        default: k8s
        required: true
        type: string
      accept-linterrors:
        default: false
        required: false
        type: boolean
      accept-failedtests:
        default: false
        required: false
        type: boolean

jobs:
  Lint-Python:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ghcr.io/astral-sh/ruff:${{ inputs.ruff-version }}
    environment: ${{ inputs.environment-name }}
    continue-on-error: ${{ inputs.accept-linterrors }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Lint python code
        run: |
          ruff check src/ tests/

  Test-Python:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: python:${{ inputs.python-version }}
    environment: ${{ inputs.environment-name }}
    continue-on-error: ${{ inputs.accept-failedtests }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set homerun defaults
        run: |
          echo "SEVERITY=ERROR" >> $GITHUB_ENV
          echo "STATUS=FAILED" >> $GITHUB_ENV
          echo "Start Time: $(date +%s)" && echo "start=$(date +%s)" >> $GITHUB_ENV

      - name: Install and test
        run: |
          pip install -q ".[dev]"
          pytest tests/ -v
          echo "SEVERITY=SUCCESS" >> $GITHUB_ENV
        shell: bash

      - name: Set homerun values
        run: |
          duration=$(($(date +%s) - start))
          echo "TEST_TIME=$(echo $duration)" >> $GITHUB_ENV
          echo "STATUS=SUCCESS" >> $GITHUB_ENV
          echo $duration
        env:
          start: ${{ env.start }}

      - name: Send Message To Homerun
        if: always()
        uses: stuttgart-things/github-workflow-templates/actions/send-homerun-message@main
        with:
          url: "https://homerun.homerun-dev.sthings-vsphere.labul.sva.de/generic"
          secretToken: "${{ secrets.HOMERUN_TOKEN }}"
          title: "[PYTHON][TEST] ${{ inputs.module-name }} - ${{ env.STATUS }}"
          message: "COMMIT: ${{ github.event.head_commit.message }} BRANCH: ${{ github.head_ref || github.ref_name }} MODULE: ${{ inputs.module-name }} TEST-TIME: ${TEST_TIME}s REPO: https://github.com/${GITHUB_REPOSITORY}"
          severity: "${{ env.SEVERITY }}"
          artifacts: "${{ inputs.module-name }}"
          tags: "github,${{ inputs.module-name }},python,test"
          assigneeName: "${GITHUB_ACTOR}"

  Build-Python:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: python:${{ inputs.python-version }}
    environment: ${{ inputs.environment-name }}
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set homerun defaults
        run: |
          echo "SEVERITY=ERROR" >> $GITHUB_ENV
          echo "STATUS=FAILED" >> $GITHUB_ENV
          echo "Start Time: $(date +%s)" && echo "start=$(date +%s)" >> $GITHUB_ENV

      - name: Build python package
        run: |
          pip install -q build
          python -m build
          ls -lh dist/
          echo "SEVERITY=SUCCESS" >> $GITHUB_ENV

      - name: Set homerun values
        run: |
          duration=$(($(date +%s) - start))
          echo "BUILD_TIME=${duration}" >> $GITHUB_ENV
          echo "STATUS=SUCCESS" >> $GITHUB_ENV
        env:
          start: ${{ env.start }}

      - name: Send Message To Homerun
        if: always()
        uses: stuttgart-things/github-workflow-templates/actions/send-homerun-message@main
        with:
          url: "https://homerun.homerun-dev.sthings-vsphere.labul.sva.de/generic"
          secretToken: "${{ secrets.HOMERUN_TOKEN }}"
          title: "[PYTHON][BUILD]-${{ inputs.module-name }}-${{ env.STATUS }}"
          message: "COMMIT: ${{ github.event.head_commit.message }} BRANCH: ${{ github.head_ref || github.ref_name }} MODULE: ${{ inputs.module-name }} BUILD-TIME: ${BUILD_TIME}s REPO: https://github.com/${GITHUB_REPOSITORY}"
          severity: "${{ env.SEVERITY }}"
          artifacts: "${{ inputs.module-name }}"
          tags: "github,${{ inputs.module-name }},python,build"
          assigneeName: "${GITHUB_ACTOR}"
