---
name: Terraform Vault via Dagger TerraformApply
on:
  workflow_call:
    inputs:
      lab:
        description: "Lab identifier used to resolve secret paths (e.g. labul, labda)"
        required: true
        type: string
      cluster-name:
        description: "Target cluster name (e.g. philly)"
        required: true
        type: string
      runs-on:
        required: false
        type: string
        default: dagger-labul
      environment-name:
        required: false
        type: string
        default: k8s
      source-repo:
        description: "Repository containing SOPS secrets + terraform config (owner/repo)"
        required: true
        type: string
      terraform-dir:
        description: "Directory containing the Terraform config"
        required: false
        type: string
        default: terraform/vault/cluster-issuer
      operation:
        description: "Terraform operation (apply|destroy)"
        required: false
        type: string
        default: apply
      branch-name:
        required: false
        type: string
        default: main
      dagger-version:
        required: false
        type: string
        default: "0.20.6"
      blueprints-version:
        required: false
        type: string
        default: v1.82.0
  workflow_dispatch:
    inputs:
      lab:
        description: LAB (labul, labda)
        required: true
        type: choice
        options: [labul, labda]
      cluster-name:
        description: CLUSTER NAME
        required: true
        type: string
      source-repo:
        description: owner/repo
        required: true
        type: string
      terraform-dir:
        description: TERRAFORM CONFIG DIR
        required: false
        type: string
        default: terraform/vault/cluster-issuer
      operation:
        required: false
        type: choice
        options: [apply, destroy]
        default: apply
      branch-name:
        required: false
        type: string
        default: main

env:
  KUBE_CONFIG_ENC: secrets/kubeconfigs/${{ inputs.cluster-name }}.yaml
  ENCRYPTED_ENV: secrets/envs/vault-infra-${{ inputs.lab }}.enc.yaml
  TFVARS_TEMPLATE: secrets/envs/vault-ca-terraform-tfvars.json.tmpl
  TF_DIR: ${{ inputs.terraform-dir }}
  CONTAINER_KUBECONFIG: /root/.kube/config

jobs:
  Terraform-Vault:
    name: Terraform ${{ inputs.operation }}
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment-name }}
    steps:
      - name: Checkout source repo
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ inputs.source-repo }}
          token: ${{ secrets.GH_TOKEN }}
          fetch-depth: '0'
          ref: ${{ inputs.branch-name }}

      - name: Render + SOPS-encrypt tfvars JSON into terraform dir
        uses: dagger/dagger-for-github@v8.4.1
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
          AGE_PUB: ${{ secrets.AGE_PUB }}
        with:
          version: ${{ inputs.dagger-version }}
          verb: call
          module: github.com/stuttgart-things/blueprints/configuration@${{ inputs.blueprints-version }}
          args: >-
            create-secrets-file
            --age-key env:SOPS_AGE_KEY
            --age-recipient env:AGE_PUB
            --encrypted-data-file ${{ env.ENCRYPTED_ENV }}
            --template-file ${{ env.TFVARS_TEMPLATE }}
            --encrypt=true
            --file-extension json
            export --path ${{ env.TF_DIR }}/terraform.tfvars.sops.json
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Generate backend_override.tf
        shell: bash
        run: |
          cat > "${TF_DIR}/backend_override.tf" <<EOF
          terraform {
            backend "kubernetes" {
              namespace     = "kube-system"
              config_path   = "${CONTAINER_KUBECONFIG}"
              secret_suffix = "${{ inputs.cluster-name }}"
            }
          }
          EOF
          cat "${TF_DIR}/backend_override.tf"

      - name: Terraform ${{ inputs.operation }} via Dagger
        uses: dagger/dagger-for-github@v8.4.1
        env:
          SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
        with:
          version: ${{ inputs.dagger-version }}
          verb: call
          module: github.com/stuttgart-things/blueprints/configuration@${{ inputs.blueprints-version }}
          args: >-
            terraform-apply
            --terraform-dir ${{ env.TF_DIR }}
            --sops-age-key env:SOPS_AGE_KEY
            --encrypted-files terraform.tfvars.sops.json
            --encrypted-kube-config ${{ env.KUBE_CONFIG_ENC }}
            --kube-config-path ${{ env.CONTAINER_KUBECONFIG }}
            --operation ${{ inputs.operation }}
            --variables "cluster_name=${{ inputs.cluster-name }},kubeconfig_path=${{ env.CONTAINER_KUBECONFIG }}"
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
