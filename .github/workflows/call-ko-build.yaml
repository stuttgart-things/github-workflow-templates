---
name: Build & Push Container Image (Ko)
on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        type: string
      go-version:
        default: "1.25.5"
        type: string
      platforms:
        default: linux/amd64,linux/arm64
        type: string
      build-path:
        default: "."
        type: string
        description: "Ko importpath to build (e.g. ./cmd/myapp)"
permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build, Scan & Push Image
    runs-on: ${{ inputs.runs-on }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ inputs.go-version }}

      - name: Set up Ko
        uses: ko-build/setup-ko@v0.9

      - name: Set image repository
        id: image-repo
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          RANDOM_TAG=$(openssl rand -hex 6)
          echo "repo=ttl.sh/${REPO_NAME}-${RANDOM_TAG}" >> $GITHUB_OUTPUT
          echo "tag=latest" >> $GITHUB_OUTPUT

      - name: Set build metadata
        id: build-meta
        run: |
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT
          echo "version=$(git describe --tags --always 2>/dev/null || echo unset)" >> $GITHUB_OUTPUT

      - name: Build and push image
        run: |
          ko build --bare --tags=${{ steps.image-repo.outputs.tag }} ${{ inputs.build-path }} \
            --platform=${{ inputs.platforms }}
        env:
          KO_DOCKER_REPO: ${{ steps.image-repo.outputs.repo }}
          VERSION: ${{ steps.build-meta.outputs.version }}
          BUILD_DATE: ${{ steps.build-meta.outputs.date }}
          COMMIT: ${{ steps.build-meta.outputs.commit }}

      - name: Image Summary
        run: |
          IMAGE="${{ steps.image-repo.outputs.repo }}:${{ steps.image-repo.outputs.tag }}"
          echo "## Container Image Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${IMAGE}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Pull command:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${IMAGE}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Note:** ttl.sh images expire after 1 hour" >> $GITHUB_STEP_SUMMARY
