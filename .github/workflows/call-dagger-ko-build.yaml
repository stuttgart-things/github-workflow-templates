---
name: Build & Push Container Image (Dagger KoBuild)
on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        type: string
      working-directory:
        default: "."
        type: string
        description: "Directory containing go.mod (passed as --src)"
      build-path:
        default: "."
        type: string
        description: "Ko importpath to build (e.g. ./cmd/myapp)"
      image-repo:
        required: true
        type: string
        description: "Target image repo (e.g. ttl.sh/myapp-abc123)"
      ko-version:
        # Ko SHA that ships Go >= 1.26 (same value used in the repo Taskfile).
        # Bump in lockstep with the workflow modules' go.mod.
        default: "1c688bd6325d7b041fdc7d1be092f96054c35d39"  # pragma: allowlist secret
        type: string
      push:
        default: "true"
        type: string
      dagger-module:
        default: "github.com/stuttgart-things/dagger/go@v0.103.0"
        type: string
      dagger-version:
        default: "0.20.6"
        type: string
      image-ref-artifact:
        default: ""
        type: string
        description: "If set, upload the pushed image ref to an artifact with this name (for consumption by a downstream scan job)"
    outputs:
      image-ref:
        description: "Fully-qualified pushed image reference"
        value: ${{ jobs.build.outputs.image-ref }}

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: KoBuild via Dagger
    runs-on: ${{ inputs.runs-on }}
    outputs:
      image-ref: ${{ steps.ko.outputs.image-ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Dagger CLI
        run: |
          curl -fsSL https://dl.dagger.io/dagger/install.sh \
            | BIN_DIR=$HOME/.local/bin DAGGER_VERSION="${{ inputs.dagger-version }}" sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build and push image
        id: ko
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REF=$(dagger call -m "${{ inputs.dagger-module }}" \
            ko-build \
            --src "${{ inputs.working-directory }}" \
            --build-arg "${{ inputs.build-path }}" \
            --repo "${{ inputs.image-repo }}" \
            --ko-version "${{ inputs.ko-version }}" \
            --push "${{ inputs.push }}" \
            --token-name GITHUB_TOKEN \
            --token env:GITHUB_TOKEN)
          echo "image-ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Built: $REF"

      - name: Write image ref file
        if: ${{ inputs.image-ref-artifact != '' }}
        run: printf '%s' '${{ steps.ko.outputs.image-ref }}' > image-ref.txt

      - name: Upload image ref artifact
        if: ${{ inputs.image-ref-artifact != '' }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.image-ref-artifact }}
          path: image-ref.txt

      - name: Summary
        run: |
          {
            echo "## Dagger KoBuild"
            echo ""
            echo "**Image:** \`${{ steps.ko.outputs.image-ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
