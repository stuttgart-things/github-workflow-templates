---
name: Crossplane Configuration Verification with Dagger
on:
  workflow_call:
    inputs:
      runs-on:
        required: false
        type: string
        default: ubuntu-latest
      environment-name:
        required: false
        type: string
        default: k8s
      src:
        description: >-
          Path to a single Crossplane Configuration directory
          (containing crossplane.yaml, apis/, examples/).
        required: true
        type: string
      provider-kubernetes-version:
        description: >-
          provider-kubernetes version whose CRD schemas are used for Layer 2
          (Object wrapper) validation. Should match the dependsOn floor in the
          Configuration's crossplane.yaml.
        required: false
        type: string
        default: v1.2.0
      dagger-version:
        description: "Dagger CLI version"
        required: false
        type: string
        default: "0.20.8"
      crossplane-module-version:
        description: "Version of stuttgart-things/dagger/crossplane to invoke"
        required: false
        type: string
        # v0.118.0: pins the crank CLI to v2.2.2 and tolerates the crossplane
        # release bucket's currently-mismatched crank.sha256. Earlier versions
        # tracked the `stable` channel's floating `current` marker, so when it
        # advanced to crank v2.3.0 (which runs `crossplane internal render` in
        # Docker, incompatible with the function images) render broke for every
        # function-based Configuration with no code change. See
        # stuttgart-things/dagger#295. Carries forward the v0.115.2 behaviour
        # (Layer 3 -ignore-missing-schemas; EnvironmentConfigs via
        # --extra-resources for offline render).
        default: v0.118.0

permissions:
  contents: read

jobs:
  Crossplane-Verify:
    name: Crossplane Verify (${{ inputs.src }})
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment-name }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify Configuration
        uses: dagger/dagger-for-github@27b130bf0f79a7f6fbbbe0fbca6760dc9bb40a77 # v8.4.1
        with:
          version: ${{ inputs.dagger-version }}
          verb: call
          module: github.com/stuttgart-things/dagger/crossplane@${{ inputs.crossplane-module-version }}
          args: >-
            verify
            --src ${{ inputs.src }}
            --provider-kubernetes-version ${{ inputs.provider-kubernetes-version }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
