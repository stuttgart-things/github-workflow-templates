---
name: Trivy Image Scan (Dagger)
on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        type: string
      image-ref:
        required: true
        type: string
        description: "Image reference to scan (e.g. ttl.sh/app:tag)"
      severity:
        default: "HIGH,CRITICAL"
        type: string
      trivy-version:
        default: "0.64.1"
        type: string
      dagger-module:
        default: "github.com/stuttgart-things/dagger/trivy@v0.103.0"
        type: string
      dagger-version:
        default: "0.20.6"
        type: string
      artifact-name:
        default: "trivy-image-report"
        type: string
      continue-on-error:
        default: false
        type: boolean

permissions:
  contents: read

jobs:
  trivy-scan:
    name: Trivy scan-image via Dagger
    runs-on: ${{ inputs.runs-on }}
    continue-on-error: ${{ inputs.continue-on-error }}
    steps:
      - name: Scan image
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ inputs.dagger-version }}
          module: ${{ inputs.dagger-module }}
          args: >-
            scan-image
            --image-ref ${{ inputs.image-ref }}
            --severity ${{ inputs.severity }}
            --trivy-version ${{ inputs.trivy-version }}
            export --path ./trivy-image-report.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: trivy-image-report.txt
