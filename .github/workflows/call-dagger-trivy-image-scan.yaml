---
name: Trivy Image Scan (Dagger)
on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        type: string
      image-ref:
        default: ""
        type: string
        description: "Image reference to scan. Either this or image-ref-artifact must be set."
      image-ref-artifact:
        default: ""
        type: string
        description: "Name of a previously-uploaded artifact containing a single image-ref.txt file; takes precedence over image-ref."
      severity:
        default: "HIGH,CRITICAL"
        type: string
      trivy-version:
        default: "0.64.1"
        type: string
      dagger-module:
        default: "github.com/stuttgart-things/dagger/trivy@v0.103.0"
        type: string
      dagger-version:
        default: "0.20.6"
        type: string
      artifact-name:
        default: "trivy-image-report"
        type: string
      continue-on-error:
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  trivy-scan:
    name: Trivy scan-image via Dagger
    runs-on: ${{ inputs.runs-on }}
    continue-on-error: ${{ inputs.continue-on-error }}
    steps:
      - name: Download image ref artifact
        if: ${{ inputs.image-ref-artifact != '' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.image-ref-artifact }}

      - name: Resolve image ref
        id: ref
        run: |
          if [[ -n "${{ inputs.image-ref-artifact }}" ]]; then
            REF=$(cat image-ref.txt)
          else
            REF='${{ inputs.image-ref }}'
          fi
          if [[ -z "$REF" ]]; then
            echo "::error::Neither image-ref nor image-ref-artifact resolved to a value"
            exit 1
          fi
          echo "image-ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Scanning: $REF"

      - name: Scan image
        uses: dagger/dagger-for-github@v8.4.1
        with:
          version: ${{ inputs.dagger-version }}
          module: ${{ inputs.dagger-module }}
          args: >-
            scan-image
            --image-ref ${{ steps.ref.outputs.image-ref }}
            --severity ${{ inputs.severity }}
            --trivy-version ${{ inputs.trivy-version }}
            export --path ./trivy-image-report.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact-name }}
          path: trivy-image-report.txt
