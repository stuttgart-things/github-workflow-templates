---
name: Build Hugo Blog
on:
  workflow_call:
    inputs:
      image:
        required: false
        type: string
        default: floryn90/hugo:0.126.1-ext-ubuntu-ci
      environment-name:
        required: false
        type: string
        default: k8s
      site-name:
        required: true
        type: string
      creation-script-path:
        required: true
        type: string
      runs-on:
        required: true
        type: string
      s3-bucket:
        required: true
        type: string
      s3-endpoint:
        required: true
        type: string
      s3-alias:
        required: false
        type: string
        default: s3
jobs:
  Create-Hugo-Content:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ${{ inputs.image }}
    environment: ${{ inputs.environment-name }}
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Execute blog creation script
        run: |
          ls -lta
          bash ${{ inputs.creation-script-path }} ${{ inputs.site-name }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hugo-dev
          path: |-
            ${{ inputs.site-name }}

  Sync-Hugo-Dev-Minio:
    name: Sync Minio Dev
    needs: Create-Hugo-Content
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-minio-sync.yaml@e002aaefd43fbc4d9598ea5a33697e6b2c6e9ed5 # mc2024-05-14
    with:
      folder: hugo-dev
      endpoint: ${{ inputs.s3-endpoint }}
      image: eu.gcr.io/stuttgart-things/sthings-mc-rclone:2024-05-14
      environment: ${{ inputs.environment-name }}
      bucket: ${{ inputs.s3-bucket }}
      s3-alias: ${{ inputs.s3-alias }} # COULD BE LOADED FROM ENV
      runs-on: ${{ inputs.runs-on }}
      site-name: ${{ inputs.site-name }}
    secrets: inherit # pragma: allowlist secret

  Build-Hugo-Site:
    runs-on: ${{ inputs.runs-on }}
    container:
      image: ${{ inputs.image }}
    environment: ${{ inputs.environment-name }}
    continue-on-error: false
    needs: Create-Hugo-Content
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: hugo-dev
          path: |-
            ${{ inputs.site-name }}

      - name: Execute blog creation script
        run: |
          ls -lta ${{ inputs.site-name }}
          cd ${{ inputs.site-name }} && hugo --logLevel info --destination ../public

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: hugo-public
          path: public

  Sync-Hugo-Public-Minio:
    name: Sync Minio Public
    needs: Build-Hugo-Site
    uses: stuttgart-things/github-workflow-templates/.github/workflows/call-minio-sync.yaml@e002aaefd43fbc4d9598ea5a33697e6b2c6e9ed5 # mc2024-05-14
    with:
      folder: hugo-public
      endpoint: ${{ inputs.s3-endpoint }}
      image: eu.gcr.io/stuttgart-things/sthings-mc-rclone:2024-05-14
      environment: ${{ inputs.environment-name }}
      bucket: ${{ inputs.s3-bucket }}
      s3-alias: ${{ inputs.s3-alias }} # COULD BE LOADED FROM ENV
      runs-on: ${{ inputs.runs-on }}
      site-name: ${{ inputs.site-name }}
    secrets: inherit # pragma: allowlist secret

  Deploy-Hugo-Site:
    runs-on: ${{ inputs.runs-on }}
    needs: Build-Hugo-Site
    permissions:
      pages: write
      id-token: write
    container:
      image: locietta/loia-dev-base:node
    environment: ${{ inputs.environment-name }}
    env:
      MS_TEAMS_URL: ${{ secrets.MS_TEAMS_URL }}
    continue-on-error: false
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: hugo-public

      - name: Checkout code
        run: |
          ls -lta

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0 # or the latest "vX.X.X" version tag for this action

      - name: Microsoft Teams Notification
        uses: skitionek/notify-microsoft-teams@40873aa494cbb4fd3fea7773973df17d1358e48d # master
        if: always()
        with:
          webhook_url: ${{ secrets.MS_TEAMS_URL }}
