---
name: Release Go Microservice
on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        type: string
      environment-name:
        default: k8s
        type: string
      dagger-version:
        default: latest
        type: string
      dagger-release-module:
        default: github.com/stuttgart-things/dagger/release@v0.82.1
        type: string
      dagger-go-module:
        default: github.com/stuttgart-things/dagger/go@v0.82.1
        type: string
      dagger-crane-module:
        default: github.com/stuttgart-things/dagger/crane@v0.82.1
        type: string
      dagger-kcl-module:
        default: github.com/stuttgart-things/dagger/kcl@v0.82.1
        type: string
      releaser-version:
        default: v2.13.3
        type: string
      source-image:
        required: true
        type: string
        description: Source image to stage (e.g. ghcr.io/org/app:main)
      target-image-repo:
        required: true
        type: string
        description: Target image repo (e.g. ghcr.io/org/app)
      kcl-source-dir:
        default: deployment
        type: string
      kcl-profile-file:
        required: true
        type: string
        description: KCL parameters file path
      kustomize-oci-repo:
        required: true
        type: string
        description: Kustomize OCI repo (e.g. ghcr.io/org/app-kustomize)
      dry-run-only:
        default: false
        type: boolean
        description: Semantic-release dry run only

jobs:
  release:
    name: Release
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment-name }}

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version before release
        id: version-before
        run: |
          BEFORE=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "version=$BEFORE" >> $GITHUB_OUTPUT
          echo "Current latest tag: $BEFORE"

      - name: Semantic release
        uses: dagger/dagger-for-github@v8.3.0
        with:
          module: ${{ inputs.dagger-release-module }}
          call: >-
            semantic
            --src .
            --token env:GITHUB_TOKEN
            --dry-run-only=${{ inputs.dry-run-only }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: ${{ inputs.dagger-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get new version
        id: version-after
        run: |
          git fetch --tags
          AFTER=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "version=$AFTER" >> $GITHUB_OUTPUT
          echo "New latest tag: $AFTER"

          if [ "$AFTER" = "${{ steps.version-before.outputs.version }}" ] || [ "$AFTER" = "none" ]; then
            echo "No new version released. Skipping remaining steps."
            echo "new_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version: $AFTER"
            echo "new_release=true" >> $GITHUB_OUTPUT
          fi

      - name: GoReleaser
        if: steps.version-after.outputs.new_release == 'true'
        uses: dagger/dagger-for-github@v8.3.0
        with:
          module: ${{ inputs.dagger-go-module }}
          call: >-
            release
            --src .
            --token env:GITHUB_TOKEN
            --releaser-version ${{ inputs.releaser-version }}
            export --path=/tmp/goreleaser.log
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: ${{ inputs.dagger-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage image
        if: steps.version-after.outputs.new_release == 'true'
        uses: dagger/dagger-for-github@v8.3.0
        with:
          module: ${{ inputs.dagger-crane-module }}
          call: >-
            copy
            --source "${{ inputs.source-image }}"
            --target "${{ inputs.target-image-repo }}:${{ steps.version-after.outputs.version }}"
            --target-username "${{ github.actor }}"
            --target-password env:GITHUB_TOKEN
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: ${{ inputs.dagger-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push kustomize base
        if: steps.version-after.outputs.new_release == 'true'
        uses: dagger/dagger-for-github@v8.3.0
        with:
          module: ${{ inputs.dagger-kcl-module }}
          call: >-
            push-kustomize-base
            --source ./${{ inputs.kcl-source-dir }}
            --parameters-file ./${{ inputs.kcl-profile-file }}
            --address ${{ inputs.kustomize-oci-repo }}
            --tag ${{ steps.version-after.outputs.version }}
            --user env:GITHUB_USER
            --password env:GITHUB_TOKEN
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: ${{ inputs.dagger-version }}
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release summary
        if: steps.version-after.outputs.new_release == 'true'
        run: |
          VERSION="${{ steps.version-after.outputs.version }}"
          echo "## Release $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Binaries** | Published via GoReleaser |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ inputs.target-image-repo }}:$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Kustomize** | \`${{ inputs.kustomize-oci-repo }}:$VERSION\` |" >> $GITHUB_STEP_SUMMARY

      - name: No release summary
        if: steps.version-after.outputs.new_release != 'true'
        run: |
          echo "## No Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No new version was created by semantic-release. All steps were skipped." >> $GITHUB_STEP_SUMMARY
