---
name: Release Go Microservice
on:
  workflow_call:
    inputs:
      runs-on:
        default: ubuntu-latest
        type: string
      environment-name:
        default: k8s
        type: string
      dagger-version:
        default: latest
        type: string
      dagger-release-module:
        default: github.com/stuttgart-things/dagger/release@v0.82.1
        type: string
      dagger-go-module:
        default: github.com/stuttgart-things/dagger/go@v0.82.1
        type: string
      dagger-crane-module:
        default: github.com/stuttgart-things/dagger/crane@v0.82.1
        type: string
      dagger-kcl-module:
        default: github.com/stuttgart-things/dagger/kcl@v0.82.1
        type: string
      releaser-version:
        default: v2.13.3
        type: string
      source-image:
        required: true
        type: string
        description: Source image to stage (e.g. ghcr.io/org/app:main)
      target-image-repo:
        required: true
        type: string
        description: Target image repo (e.g. ghcr.io/org/app)
      kcl-source-dir:
        default: deployment
        type: string
      kcl-profile-file:
        required: true
        type: string
        description: KCL parameters file path
      kustomize-oci-repo:
        required: true
        type: string
        description: Kustomize OCI repo (e.g. ghcr.io/org/app-kustomize)
      dry-run-only:
        default: false
        type: boolean
        description: Semantic-release dry run only

jobs:
  release:
    name: Release
    runs-on: ${{ inputs.runs-on }}
    environment: ${{ inputs.environment-name }}

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get version before release
        id: version-before
        run: |
          BEFORE=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "version=$BEFORE" >> $GITHUB_OUTPUT
          echo "Current latest tag: $BEFORE"

      - name: Semantic release
        uses: dagger/dagger-for-github@v8.3.0
        with:
          module: ${{ inputs.dagger-release-module }}
          call: >-
            semantic
            --src .
            --token env:GITHUB_TOKEN
            --dry-run-only=${{ inputs.dry-run-only }}
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: ${{ inputs.dagger-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get new version
        id: version-after
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Query remote tags directly to avoid local git cache issues
          # Filter out ^{} dereferenced entries and non-semver tags
          AFTER=$(git ls-remote --tags origin 'refs/tags/v*' \
            | grep -v '\^{}' | sed 's|.*refs/tags/||' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1 || echo "none")
          AFTER="${AFTER:-none}"
          echo "version=$AFTER" >> $GITHUB_OUTPUT
          echo "New latest tag: $AFTER"

          if [ "$AFTER" = "${{ steps.version-before.outputs.version }}" ] || [ "$AFTER" = "none" ]; then
            echo "No new version released. Skipping remaining steps."
            echo "new_release=false" >> $GITHUB_OUTPUT
          else
            echo "New version: $AFTER"
            echo "new_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Sync to released commit
        if: steps.version-after.outputs.new_release == 'true'
        run: |
          # Semantic-release creates a new commit (CHANGELOG) and tag on the remote.
          # Pull the latest so goreleaser sees the correct tagged commit.
          git fetch --tags
          git pull --ff-only || true
          echo "HEAD is now at $(git rev-parse --short HEAD)"
          echo "Tag ${{ steps.version-after.outputs.version }} points to $(git rev-parse --short ${{ steps.version-after.outputs.version }})"

      - name: GoReleaser
        if: steps.version-after.outputs.new_release == 'true'
        uses: dagger/dagger-for-github@v8.3.0
        with:
          module: ${{ inputs.dagger-go-module }}
          call: >-
            release
            --src .
            --token env:GITHUB_TOKEN
            --releaser-version ${{ inputs.releaser-version }}
            export --path=/tmp/goreleaser.log
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: ${{ inputs.dagger-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Stage image
        if: steps.version-after.outputs.new_release == 'true'
        uses: dagger/dagger-for-github@v8.3.0
        with:
          module: ${{ inputs.dagger-crane-module }}
          call: >-
            copy
            --source "${{ inputs.source-image }}"
            --target "${{ inputs.target-image-repo }}:${{ steps.version-after.outputs.version }}"
            --target-username "${{ github.actor }}"
            --target-password env:GITHUB_TOKEN
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: ${{ inputs.dagger-version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push kustomize base
        if: steps.version-after.outputs.new_release == 'true'
        uses: dagger/dagger-for-github@v8.3.0
        with:
          module: ${{ inputs.dagger-kcl-module }}
          call: >-
            push-kustomize-base
            --source ./${{ inputs.kcl-source-dir }}
            --parameters-file ./${{ inputs.kcl-profile-file }}
            --address ${{ inputs.kustomize-oci-repo }}
            --tag ${{ steps.version-after.outputs.version }}
            --user env:GITHUB_USER
            --password env:GITHUB_TOKEN
          cloud-token: ${{ secrets.DAGGER_CLOUD_TOKEN }}
          version: ${{ inputs.dagger-version }}
        env:
          GITHUB_USER: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release notes with artifacts
        if: steps.version-after.outputs.new_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version-after.outputs.version }}"

          # Get existing release body
          EXISTING_BODY=$(gh release view "$VERSION" --json body --jq '.body')

          # Append artifact info and deploy instructions to release body
          REPO_NAME="${{ github.event.repository.name }}"
          REPO_FULL="${{ github.repository }}"

          gh release edit "$VERSION" --notes "$(cat <<EOF
          ${EXISTING_BODY}

          ### Artifacts

          | Artifact | Reference |
          |----------|-----------|
          | **Image** | \`${{ inputs.target-image-repo }}:${VERSION}\` |
          | **Kustomize** | \`${{ inputs.kustomize-oci-repo }}:${VERSION}\` |

          \`\`\`bash
          docker pull ${{ inputs.target-image-repo }}:${VERSION}
          \`\`\`

          ### Deploy

          **1. Pull kustomize base**

          \`\`\`bash
          oras pull ${{ inputs.kustomize-oci-repo }}:${VERSION} -o /tmp/kustomize-base-${REPO_NAME}
          \`\`\`

          **2. Apply to cluster**

          \`\`\`bash
          kubectl apply -k /tmp/kustomize-base-${REPO_NAME}/
          \`\`\`

          **3. (Optional) Use an overlay**

          Copy the pulled base into \`deployment/kustomize-base\` and apply an overlay:

          \`\`\`bash
          cp -r /tmp/kustomize-base-${REPO_NAME} deployment/kustomize-base
          kubectl apply -k deployment/overlays/example/
          \`\`\`

          See [deployment README](https://github.com/${REPO_FULL}/blob/${VERSION}/deployment/README.md) and [example overlay](https://github.com/${REPO_FULL}/tree/${VERSION}/deployment/overlays/example) for details.
          EOF
          )"

      - name: Release summary
        if: steps.version-after.outputs.new_release == 'true'
        run: |
          VERSION="${{ steps.version-after.outputs.version }}"
          echo "## Release $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Details |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Version** | \`$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Binaries** | Published via GoReleaser |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ inputs.target-image-repo }}:$VERSION\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Kustomize** | \`${{ inputs.kustomize-oci-repo }}:$VERSION\` |" >> $GITHUB_STEP_SUMMARY

      - name: No release summary
        if: steps.version-after.outputs.new_release != 'true'
        run: |
          echo "## No Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "No new version was created by semantic-release. All steps were skipped." >> $GITHUB_STEP_SUMMARY
